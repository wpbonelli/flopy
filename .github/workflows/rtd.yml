name: FloPy documentation

on:
  push:
    branches:
      - master
      - develop
      - release*
      - ci-diagnose*
      - docs*
  pull_request:
    branches:
      - master
      - develop

jobs:

  rtd_build:
    name: Read the Docs build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, macos-latest, windows-latest ]

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout flopy repo
        uses: actions/checkout@v3

      - name: Output repo information
        run: |
          echo $GITHUB_REPOSITORY_OWNER
          echo $GITHUB_REPOSITORY
          echo $GITHUB_REF
          echo $GITHUB_EVENT_NAME

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Upgrade pip
        run: pip install --upgrade pip
      
      - name: X server workaround
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y xvfb
          pip install xvfbwrapper

      - name: Install flopy and dependencies
        run: pip install ".[test, doc, optional]"

      - name: Install MODFLOW executables
        uses: modflowpy/install-modflow-action@v1

      - name: Run jupytext on tutorials
        working-directory: ./.docs
        run: python create_tutorials.py
 
      # this is a bit redundant since notebooks get built by nbsphinx
      # in RTD build, but notebooks should be tested across platforms
      - name: Test example notebooks
        working-directory: autotest
        run: pytest -v -n auto test_example_notebooks.py

      - name: Upload completed jupyter notebooks as an artifact for ReadtheDocs
        if: github.repository_owner == 'modflowpy' && github.event_name == 'push' && runner.os == 'Linux'
        uses: actions/upload-artifact@v2
        with:
          name: notebooks-for-${{ github.sha }}
          path: |
            .docs/_notebooks

  # trigger rtd if previous job was successful
  rtd:
    name: Read the Docs trigger
    needs: rtd_build
    runs-on: ubuntu-latest

    if:
      github.repository_owner == 'modflowpy' && github.event_name == 'push'
    steps:
      - name: Trigger RTDs build on master and develop branches
        uses: dfm/rtds-action@v1.0.2
        with:
          webhook_url: ${{ secrets.RTDS_WEBHOOK_URL }}
          webhook_token: ${{ secrets.RTDS_WEBHOOK_TOKEN }}
          commit_ref: ${{ github.ref }}
